name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-ipa:
    runs-on: macos-14  # Apple Silicon runner (M1)
    
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 4. 安装前端依赖
      - name: Install dependencies
        run: pnpm install

      # 5. 构建前端产物
      - name: Build web assets
        run: pnpm build

      # 6. 同步到 iOS 项目
      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # 7. 选择 Xcode 版本
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # 8. 解析 SPM 依赖
      - name: Resolve Swift Package Dependencies
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS'

      # 9. 构建 .app（无签名）
      - name: Build unsigned app
        run: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # 10. 打包为 IPA
      - name: Package IPA
        run: |
          # 找到 .app 文件
          APP_PATH=$(find ios/App/build -name "App.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          # 创建 Payload 目录
          mkdir -p ipa-output/Payload
          
          # 复制 .app 到 Payload
          cp -r "$APP_PATH" ipa-output/Payload/ScriptPanel.app
          
          # 打包为 IPA
          cd ipa-output
          zip -r ../ScriptPanel.ipa Payload/
          cd ..
          
          echo "IPA created successfully!"
          ls -lh ScriptPanel.ipa

      # 11. 上传 IPA 为 Artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ScriptPanel-IPA
          path: ScriptPanel.ipa
          retention-days: 30
